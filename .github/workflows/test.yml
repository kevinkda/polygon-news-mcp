name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  ci:
    # V5-D: consume the shared reusable CI workflow (kevinkda/mcp-ci-templates).
    # secrets: inherit is required so the gitleaks step receives GITHUB_TOKEN.
    # force-bash-shell keeps the original behaviour of running identical bash
    # steps on every OS (incl. Windows via Git for Windows).
    uses: kevinkda/mcp-ci-templates/.github/workflows/reusable-mcp-ci.yml@main
    secrets: inherit  # pragma: allowlist secret
    with:
      os-matrix: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      python-versions: '["3.11", "3.12"]'
      run-markdownlint: true
      force-bash-shell: true
